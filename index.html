<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mango Society Sales</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fffcf0; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #d35400; text-align: center; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .price-box { margin-top: 20px; padding: 15px; background: #fff3e0; border-left: 5px solid #e67e22; border-radius: 5px; }
        .total-row { font-size: 1.3rem; color: #d35400; font-weight: bold; margin-top: 5px; }
        button { width: 100%; padding: 15px; margin-top: 25px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #219150; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <form id="mangoForm">
        <h2>🥭 Society Mango Order</h2>
        
        <label>Society Name</label>
        <select id="societySelect" onchange="checkSociety(this.value)" required>
            <option value="">-- Select Your Society --</option>
            <option value="Capriccio Society">Capriccio Society</option>
            <option value="La Melosa">La Melosa</option>
            <option value="Lakeshore">Lakeshore</option>
            <option value="Mont Vert">Mont Vert</option>
            <option value="Malpani Greens">Malpani Greens</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" name="SocietyName" id="manualSociety" style="display:none; margin-top: 10px;">

        <label>Full Name</label>
        <input type="text" name="Name" placeholder="Enter your name" required>

        <label>Phone Number</label>
        <input type="tel" name="Phone" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
        
        <label>Select Variety</label>
        <select name="MangoType" id="mangoType">
            <option value="Ratnagiri">Ratnagiri Hapus</option>
            <option value="Devgad">Devgad Hapus</option>
        </select>

        <label>Quantity (Dozen)</label>
        <input type="number" name="Quantity" id="quantity" min="1" value="1" required>

        <label>Payment Method</label>
        <select name="PaymentMethod" id="paymentMethod" onchange="checkPayment(this.value)">
            <option value="Payment on Delivery">Payment on Delivery</option>
            <option value="Online Paid">Online Paid (UPI: 9322449900)</option>
        </select>

        <div id="paymentInstructions" style="display:none; margin-top: 10px; padding: 10px; background: #e3f2fd; border-radius: 8px; border: 1px solid #2196f3; font-size: 0.85rem;">
            <strong>Payment Details:</strong><br>
            Please pay via UPI to: <b>9322449900</b><br>
            <i>(Kindly share the screenshot on WhatsApp after payment)</i>
        </div>

        <div class="price-box">
            <small>Price per Dozen: ₹<span id="unitPrice">800</span></small>
            <div class="total-row">Total: ₹<span id="displayPrice">800</span></div>
        </div>

        <input type="hidden" name="TotalPrice" id="hiddenPrice" value="800">
        <button type="submit" id="submitBtn">Place Order</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkGWLVAWrFvo6jyY32dB_VD1F-_ILZzjoc0I0eldlBrRcw2zmK-67PYuQG4E1CqwLS8Q/exec'; 

    const prices = { "Ratnagiri": 800, "Devgad": 825 };

    function checkSociety(val) {
        const manualInput = document.getElementById('manualSociety');
        if (val === 'Other') {
            manualInput.style.display = 'block';
            manualInput.required = true;
        } else {
            manualInput.style.display = 'none';
            manualInput.value = val;
            manualInput.required = false;
        }
    }

    function checkPayment(val) {
        document.getElementById('paymentInstructions').style.display = (val === 'Online Paid') ? 'block' : 'none';
    }

    const form = document.getElementById('mangoForm');
    function calculatePrice() {
        const type = document.getElementById('mangoType').value;
        const qty = document.getElementById('quantity').value;
        const total = qty * prices[type];
        document.getElementById('unitPrice').innerText = prices[type];
        document.getElementById('displayPrice').innerText = total;
        document.getElementById('hiddenPrice').value = total;
    }

    document.getElementById('mangoType').addEventListener('change', calculatePrice);
    document.getElementById('quantity').addEventListener('input', calculatePrice);

    form.addEventListener('submit', e => {
        e.preventDefault();
        if (document.getElementById('societySelect').value !== 'Other') {
            document.getElementById('manualSociety').value = document.getElementById('societySelect').value;
        }
        const btn = document.getElementById('submitBtn');
        btn.innerHTML = "Processing...";
        btn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                const payMethod = document.getElementById('paymentMethod').value;
                
                if (payMethod === 'Online Paid') {
                    alert("Order Recorded! Redirecting to WhatsApp for payment screenshot.");
                    window.open("https://wa.me/7709999264?text=Hi, I just placed a prepaid mango order, here is the screenshot", "_blank");
                } else {
                    alert("Thank you! Your Payment on Delivery order has been successfully recorded.");
                }

                form.reset();
                document.getElementById('paymentInstructions').style.display = 'none';
                document.getElementById('manualSociety').style.display = 'none';
                calculatePrice();
                btn.innerHTML = "Place Order";
                btn.disabled = false;
            })
            .catch(error => {
                alert("Error! Check internet.");
                btn.disabled = false;
                btn.innerHTML = "Place Order";
            });
    });
</script>
</body>
</html>
